<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halterofit Wordmark Render</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: transparent;
      }

      .logo {
        font-family: 'Orbitron', sans-serif;
        font-weight: 700;
        font-size: 72px;
        letter-spacing: 6px;
        text-transform: uppercase;
        white-space: nowrap;
        display: inline-block;
        padding: 8px 4px;
      }

      /* --- Dark background variant (id="dark") --- */
      #dark .prefix {
        color: #ffffff;
      }
      #dark .accent {
        background: linear-gradient(90deg, #67e8f9 0%, #0ea5e9 45%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* --- Light background variant (id="light") --- */
      #light .prefix {
        color: #1a1a1a;
      }
      #light .accent {
        background: linear-gradient(90deg, #0891b2 0%, #0369a1 45%, #4f46e5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>
  </head>
  <body>
    <!-- Dark bg variant: white HALTERO + gradient FIT -->
    <div id="dark" class="logo">
      <span class="prefix">HALTERO</span><span class="accent">FIT</span>
    </div>

    <br />

    <!-- Light bg variant: dark HALTERO + gradient FIT -->
    <div id="light" class="logo">
      <span class="prefix">HALTERO</span><span class="accent">FIT</span>
    </div>
  </body>
</html>
