name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'docs/**'
      - 'assets/**'
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================================================
  # Job 0: Detect which files changed (for conditional job execution)
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for code changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - 'apps/**'
              - 'packages/**'
              - 'supabase/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/workflows/ci.yml'

  # ============================================================================
  # Job 1: Lint (TypeScript + ESLint + Prettier + Audit + Expo Doctor)
  # ============================================================================
  code-quality:
    name: Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache TypeScript build info
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: apps/mobile/.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('apps/mobile/tsconfig.json', 'apps/mobile/src/**/*.ts', 'apps/mobile/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-

      - name: Cache ESLint
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: apps/mobile/.eslintcache
          key: ${{ runner.os }}-eslintcache-${{ hashFiles('apps/mobile/eslint.config.js', 'apps/mobile/src/**/*.ts', 'apps/mobile/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-eslintcache-

      - name: TypeScript type-check
        run: pnpm --filter @halterofit/mobile run type-check

      - name: ESLint
        run: pnpm --filter @halterofit/mobile run lint:check

      - name: Prettier format check
        run: pnpm --filter @halterofit/mobile run format:check

      - name: Security audit
        # Only fail on CRITICAL vulnerabilities
        run: pnpm audit --audit-level critical

      - name: Expo SDK compatibility
        run: pnpm --filter @halterofit/mobile run expo:doctor

  # ============================================================================
  # Job 2: Test (Jest with Coverage)
  # ============================================================================
  unit-tests:
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Jest
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: apps/mobile/.jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('apps/mobile/jest.config.ts', 'apps/mobile/src/**/*.test.ts') }}
          restore-keys: |
            ${{ runner.os }}-jest-

      - name: Run tests with coverage
        run: pnpm --filter @halterofit/mobile run test:ci

  # ============================================================================
  # Job 3: Secrets (TruffleHog) - Informational only, not a required check
  # ============================================================================
  secrets-scan:
    name: Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 10

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@041f07e9df901a1038a528e5525b0226d04dd5ea # v3.93.6
        with:
          extra_args: --only-verified

  # ============================================================================
  # Job 4: Gate (aggregates results for branch protection)
  # ============================================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs: [code-quality, unit-tests, secrets-scan]
    steps:
      - name: Check job results
        run: |
          if [[ "${{ needs.code-quality.result }}" == "failure" || \
                "${{ needs.unit-tests.result }}" == "failure" ]]; then
            echo "::error::CI failed — check Lint and Test jobs above"
            exit 1
          fi
          echo "CI passed"
