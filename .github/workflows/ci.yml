name: CI

on:
  push:
    branches: [master, feat/monorepo-migration]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================================================
  # Job 1: Lint (TypeScript + ESLint + Prettier + Audit + Expo Doctor)
  # ============================================================================
  code-quality:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache TypeScript build info
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: apps/mobile/.tsbuildinfo
          key: ${{ runner.os }}-tsbuildinfo-${{ hashFiles('apps/mobile/tsconfig.json', 'apps/mobile/src/**/*.ts', 'apps/mobile/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-tsbuildinfo-

      - name: Cache ESLint
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: apps/mobile/.eslintcache
          key: ${{ runner.os }}-eslintcache-${{ hashFiles('apps/mobile/eslint.config.js', 'apps/mobile/src/**/*.ts', 'apps/mobile/src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-eslintcache-

      - name: TypeScript type-check
        run: pnpm --filter @halterofit/mobile run type-check

      - name: ESLint
        run: pnpm --filter @halterofit/mobile run lint:check

      - name: Prettier format check
        run: pnpm --filter @halterofit/mobile run format:check

      - name: Security audit
        # Only fail on CRITICAL vulnerabilities
        run: pnpm audit --audit-level critical

      - name: Expo SDK compatibility
        run: pnpm --filter @halterofit/mobile run expo:doctor

  # ============================================================================
  # Job 2: Test (Jest with Coverage)
  # ============================================================================
  unit-tests:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Jest
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: apps/mobile/.jest-cache
          key: ${{ runner.os }}-jest-${{ hashFiles('apps/mobile/jest.config.ts', 'apps/mobile/src/**/*.test.ts') }}
          restore-keys: |
            ${{ runner.os }}-jest-

      - name: Run tests with coverage
        run: pnpm --filter @halterofit/mobile run test:ci

  # ============================================================================
  # Job 3: Secrets (TruffleHog) - Informational only, not a required check
  # ============================================================================
  secrets-scan:
    name: Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 10

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@041f07e9df901a1038a528e5525b0226d04dd5ea # v3.93.6
        with:
          extra_args: --only-verified
