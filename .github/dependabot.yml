version: 2
updates:
  # ── npm packages ──────────────────────────────────────────────
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
      day: monday
      time: '14:00'
      timezone: America/New_York
    open-pull-requests-limit: 3
    rebase-strategy: auto
    commit-message:
      prefix: 'chore(deps)'
    groups:
      patches:
        update-types: ['patch']
      minor-and-major:
        update-types: ['minor', 'major']
    # Expo-managed packages — ONLY update via npx expo install
    ignore:
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: '@expo/*'
      - dependency-name: 'react'
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-*'
      - dependency-name: '@react-native/*'
      - dependency-name: '@nozbe/watermelondb'
      - dependency-name: '@shopify/flash-list'
      - dependency-name: 'react-native-mmkv'

  # ── GitHub Actions ────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    commit-message:
      prefix: 'chore(ci)'
    groups:
      actions:
        patterns: ['*']
